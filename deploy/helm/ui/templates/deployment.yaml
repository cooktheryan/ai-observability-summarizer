apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["streamlit", "run", "ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
          ports:
            - containerPort: 8501
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
          env:
            - name: HOME
              value: "/tmp"
            - name: STREAMLIT_HOME
              value: "/tmp/.streamlit"
            - name: STREAMLIT_THEME_BASE
              value: "light"
            - name: MPLCONFIGDIR
              value: "/tmp/matplotlib"
            - name: PROMETHEUS_URL
              value: "{{ .Values.env.PROMETHEUS_URL }}"
            - name: LLM_URL
              value: "{{ .Values.env.LLM_URL }}"
            - name: LLAMA_STACK_URL
              value: "{{ .Values.env.LLAMA_STACK_URL }}"
            - name: LLM_API_TOKEN
              value: "{{ .Values.env.LLM_API_TOKEN }}"
            - name: PYTHON_LOG_LEVEL
              value: "{{ .Values.env.PYTHON_LOG_LEVEL }}"
            - name: MCP_SERVER_URL
              value: "http://{{ .Values.mcpServer.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.mcpServer.port }}"
            - name: MLFLOW_TRACKING_URI
              value: "{{ .Values.env.MLFLOW_TRACKING_URI }}"
            - name: MLFLOW_EXPERIMENT_NAME
              value: "{{ .Values.env.MLFLOW_EXPERIMENT_NAME }}"
            - name: MLFLOW_TRACING_ENABLED
              value: "{{ .Values.env.MLFLOW_TRACING_ENABLED }}"
      volumes:
        - name: tmp-dir
          emptyDir: {}